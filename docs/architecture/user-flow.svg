<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 700" font-family="'Segoe UI',system-ui,sans-serif">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1"/>
    </filter>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#3b82f6"/>
    </marker>
    <marker id="arrowOrange" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#f97316"/>
    </marker>
    <linearGradient id="headerGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="700" rx="12" fill="#f8fafc"/>

  <!-- Title -->
  <rect x="0" y="0" width="900" height="50" rx="12" fill="url(#headerGrad)"/>
  <rect x="0" y="12" width="900" height="38" fill="url(#headerGrad)"/>
  <text x="450" y="32" text-anchor="middle" fill="white" font-size="16" font-weight="bold">Student Challenge Flow</text>

  <!-- Step 1: Auth -->
  <rect x="340" y="75" width="220" height="55" rx="27" fill="#1e3a5f" filter="url(#shadow)"/>
  <text x="450" y="100" text-anchor="middle" fill="white" font-size="13" font-weight="bold">1. Sign Up / Login</text>
  <text x="450" y="117" text-anchor="middle" fill="#93c5fd" font-size="10">Email-based Auth</text>

  <line x1="450" y1="130" x2="450" y2="155" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 2: Browse -->
  <rect x="340" y="160" width="220" height="55" rx="27" fill="#1e40af" filter="url(#shadow)"/>
  <text x="450" y="185" text-anchor="middle" fill="white" font-size="13" font-weight="bold">2. Browse Challenges</text>
  <text x="450" y="202" text-anchor="middle" fill="#93c5fd" font-size="10">Filter by Tech Stack</text>

  <line x1="450" y1="215" x2="450" y2="240" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 3: Start -->
  <rect x="340" y="245" width="220" height="55" rx="27" fill="#1d4ed8" filter="url(#shadow)"/>
  <text x="450" y="270" text-anchor="middle" fill="white" font-size="13" font-weight="bold">3. Start Challenge</text>
  <text x="450" y="287" text-anchor="middle" fill="#93c5fd" font-size="10">Fork GitHub Repo</text>

  <line x1="450" y1="300" x2="450" y2="325" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Teaching Mode Box -->
  <rect x="100" y="330" width="700" height="250" rx="12" fill="white" stroke="#c4b5fd" stroke-width="2" stroke-dasharray="6,4" filter="url(#shadow)"/>
  <text x="130" y="355" fill="#7c3aed" font-size="13" font-weight="bold">Claude Code Teaching Mode</text>

  <!-- 5 Steps inside -->
  <rect x="140" y="370" width="140" height="60" rx="8" fill="#ede9fe" stroke="#c4b5fd" stroke-width="1"/>
  <text x="210" y="395" text-anchor="middle" fill="#6d28d9" font-size="11" font-weight="bold">Step 1</text>
  <text x="210" y="415" text-anchor="middle" fill="#475569" font-size="10">Outcome Definition</text>

  <line x1="280" y1="400" x2="310" y2="400" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="310" y="370" width="120" height="60" rx="8" fill="#ede9fe" stroke="#c4b5fd" stroke-width="1"/>
  <text x="370" y="395" text-anchor="middle" fill="#6d28d9" font-size="11" font-weight="bold">Step 2</text>
  <text x="370" y="415" text-anchor="middle" fill="#475569" font-size="10">Documentation</text>

  <line x1="430" y1="400" x2="460" y2="400" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="460" y="370" width="120" height="60" rx="8" fill="#ede9fe" stroke="#c4b5fd" stroke-width="1"/>
  <text x="520" y="395" text-anchor="middle" fill="#6d28d9" font-size="11" font-weight="bold">Step 3</text>
  <text x="520" y="415" text-anchor="middle" fill="#475569" font-size="10">Test Automation</text>

  <line x1="580" y1="400" x2="610" y2="400" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="610" y="370" width="120" height="60" rx="8" fill="#ede9fe" stroke="#c4b5fd" stroke-width="1"/>
  <text x="670" y="395" text-anchor="middle" fill="#6d28d9" font-size="11" font-weight="bold">Step 4</text>
  <text x="670" y="415" text-anchor="middle" fill="#475569" font-size="10">Hooks</text>

  <!-- Step 5 below -->
  <line x1="670" y1="430" x2="670" y2="460" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="540" y="465" width="190" height="60" rx="8" fill="#ede9fe" stroke="#c4b5fd" stroke-width="1"/>
  <text x="635" y="490" text-anchor="middle" fill="#6d28d9" font-size="11" font-weight="bold">Step 5</text>
  <text x="635" y="510" text-anchor="middle" fill="#475569" font-size="10">Skills Implementation</text>

  <!-- Git Push indicator -->
  <rect x="140" y="475" width="180" height="50" rx="8" fill="#f0fdf4" stroke="#86efac" stroke-width="1"/>
  <text x="230" y="497" text-anchor="middle" fill="#16a34a" font-size="11" font-weight="bold">Git Push to GitHub</text>
  <text x="230" y="514" text-anchor="middle" fill="#475569" font-size="9">Each step triggers CI/CD</text>

  <!-- Arrow out of teaching mode -->
  <line x1="450" y1="580" x2="450" y2="605" stroke="#f97316" stroke-width="2" marker-end="url(#arrowOrange)"/>

  <!-- Evaluation -->
  <rect x="250" y="610" width="400" height="70" rx="12" fill="#fff7ed" stroke="#fdba74" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="450" y="637" text-anchor="middle" fill="#c2410c" font-size="13" font-weight="bold">Automated Evaluation</text>
  <text x="350" y="660" fill="#475569" font-size="10">CI/CD Pipeline</text>
  <text x="500" y="660" fill="#475569" font-size="10">Claude Code Review</text>
  <line x1="480" y1="647" x2="480" y2="667" stroke="#fed7aa" stroke-width="1"/>
</svg>
