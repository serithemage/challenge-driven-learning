<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" font-family="'Segoe UI',system-ui,sans-serif">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1"/>
    </filter>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
    <linearGradient id="headerGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="620" rx="12" fill="url(#bgGrad)"/>

  <!-- Title -->
  <rect x="0" y="0" width="900" height="50" rx="12" fill="url(#headerGrad)"/>
  <rect x="0" y="12" width="900" height="38" fill="url(#headerGrad)"/>
  <text x="450" y="32" text-anchor="middle" fill="white" font-size="16" font-weight="bold">CDL System Architecture Overview</text>

  <!-- ===== Web Platform Zone ===== -->
  <rect x="30" y="70" width="840" height="220" rx="10" fill="white" stroke="#cbd5e1" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="50" y="95" fill="#334155" font-size="13" font-weight="bold">Web Platform</text>

  <!-- Frontend -->
  <rect x="60" y="110" width="200" height="160" rx="8" fill="#eff6ff" stroke="#93c5fd" stroke-width="1"/>
  <text x="160" y="133" text-anchor="middle" fill="#1d4ed8" font-size="12" font-weight="bold">Frontend (Next.js)</text>
  <text x="80" y="155" fill="#475569" font-size="10">Landing Page</text>
  <text x="80" y="172" fill="#475569" font-size="10">Challenge Browser</text>
  <text x="80" y="189" fill="#475569" font-size="10">Student Dashboard</text>
  <text x="80" y="206" fill="#475569" font-size="10">Admin Panel</text>
  <text x="80" y="223" fill="#475569" font-size="10">Auth (Login/Signup)</text>
  <text x="80" y="245" fill="#94a3b8" font-size="9">React 19 + Tailwind CSS 4</text>

  <!-- Arrow Frontend -> Backend -->
  <line x1="260" y1="190" x2="330" y2="190" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrowGray)"/>
  <text x="295" y="183" text-anchor="middle" fill="#94a3b8" font-size="9">REST API</text>

  <!-- Backend -->
  <rect x="330" y="110" width="220" height="160" rx="8" fill="#f0fdf4" stroke="#86efac" stroke-width="1"/>
  <text x="440" y="133" text-anchor="middle" fill="#16a34a" font-size="12" font-weight="bold">Backend (Go)</text>
  <text x="350" y="155" fill="#475569" font-size="10">Auth Service</text>
  <text x="350" y="172" fill="#475569" font-size="10">Challenge API</text>
  <text x="350" y="189" fill="#475569" font-size="10">Student Progress API</text>
  <text x="350" y="206" fill="#475569" font-size="10">Evaluation API</text>
  <text x="350" y="223" fill="#475569" font-size="10">Admin API</text>
  <text x="350" y="245" fill="#94a3b8" font-size="9">REST / JSON</text>

  <!-- Arrow Backend -> DB -->
  <line x1="550" y1="190" x2="620" y2="190" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrowGray)"/>

  <!-- Database -->
  <rect x="620" y="120" width="220" height="140" rx="8" fill="#fefce8" stroke="#fde047" stroke-width="1"/>
  <text x="730" y="143" text-anchor="middle" fill="#a16207" font-size="12" font-weight="bold">Database (AWS RDS)</text>
  <text x="640" y="167" fill="#475569" font-size="10">students</text>
  <text x="640" y="184" fill="#475569" font-size="10">challenges</text>
  <text x="640" y="201" fill="#475569" font-size="10">challenge_progress</text>
  <text x="640" y="218" fill="#475569" font-size="10">evaluation_results</text>
  <text x="640" y="240" fill="#94a3b8" font-size="9">PostgreSQL (TBD)</text>

  <!-- ===== Claude Code Ecosystem Zone ===== -->
  <rect x="30" y="310" width="840" height="140" rx="10" fill="white" stroke="#cbd5e1" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="50" y="335" fill="#334155" font-size="13" font-weight="bold">Claude Code Ecosystem</text>

  <!-- Teaching Mode -->
  <rect x="60" y="350" width="230" height="80" rx="8" fill="#faf5ff" stroke="#c4b5fd" stroke-width="1"/>
  <text x="175" y="373" text-anchor="middle" fill="#7c3aed" font-size="12" font-weight="bold">Teaching Mode Skill (.md)</text>
  <text x="80" y="395" fill="#475569" font-size="10">Outcome Definition Guide</text>
  <text x="80" y="412" fill="#475569" font-size="10">Step-by-step Navigation</text>

  <!-- GitHub Repos -->
  <rect x="320" y="350" width="230" height="80" rx="8" fill="#f0fdf4" stroke="#86efac" stroke-width="1"/>
  <text x="435" y="373" text-anchor="middle" fill="#16a34a" font-size="12" font-weight="bold">GitHub Repositories</text>
  <text x="340" y="395" fill="#475569" font-size="10">Student Challenge Repos</text>
  <text x="340" y="412" fill="#475569" font-size="10">RealWorld App Templates</text>

  <!-- CI/CD -->
  <rect x="580" y="350" width="260" height="80" rx="8" fill="#fff7ed" stroke="#fdba74" stroke-width="1"/>
  <text x="710" y="373" text-anchor="middle" fill="#c2410c" font-size="12" font-weight="bold">CI/CD (GitHub Actions)</text>
  <text x="600" y="395" fill="#475569" font-size="10">Test / Lint / Build</text>
  <text x="600" y="412" fill="#475569" font-size="10">Claude Code Review</text>

  <!-- ===== AWS Infrastructure Zone ===== -->
  <rect x="30" y="470" width="840" height="130" rx="10" fill="white" stroke="#cbd5e1" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="50" y="495" fill="#334155" font-size="13" font-weight="bold">AWS Infrastructure</text>

  <rect x="60" y="510" width="160" height="70" rx="8" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
  <text x="140" y="540" text-anchor="middle" fill="#dc2626" font-size="11" font-weight="bold">Compute</text>
  <text x="140" y="560" text-anchor="middle" fill="#475569" font-size="10">ECS / Lambda (TBD)</text>

  <rect x="250" y="510" width="160" height="70" rx="8" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
  <text x="330" y="540" text-anchor="middle" fill="#dc2626" font-size="11" font-weight="bold">Database</text>
  <text x="330" y="560" text-anchor="middle" fill="#475569" font-size="10">RDS PostgreSQL</text>

  <rect x="440" y="510" width="160" height="70" rx="8" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
  <text x="520" y="540" text-anchor="middle" fill="#dc2626" font-size="11" font-weight="bold">CDN / Hosting</text>
  <text x="520" y="560" text-anchor="middle" fill="#475569" font-size="10">CloudFront + S3</text>

  <rect x="630" y="510" width="210" height="70" rx="8" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
  <text x="735" y="540" text-anchor="middle" fill="#dc2626" font-size="11" font-weight="bold">Auth</text>
  <text x="735" y="560" text-anchor="middle" fill="#475569" font-size="10">Cognito / Custom (TBD)</text>

  <!-- Arrows -->
  <defs>
    <marker id="arrowGray" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#94a3b8"/>
    </marker>
    <marker id="arrowBlue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#3b82f6"/>
    </marker>
  </defs>

  <!-- Web Platform -> Claude Code Ecosystem -->
  <line x1="440" y1="290" x2="440" y2="310" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowBlue)"/>

  <!-- CI/CD -> Web Platform (webhook) -->
  <line x1="810" y1="350" x2="810" y2="290" stroke="#f97316" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="825" y="320" fill="#f97316" font-size="8">webhook</text>

  <!-- Web Platform -> AWS -->
  <line x1="200" y1="290" x2="200" y2="470" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5,3"/>
</svg>
