<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 500" font-family="'Segoe UI',system-ui,sans-serif">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1"/>
    </filter>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#64748b"/>
    </marker>
    <marker id="diamond" markerWidth="12" markerHeight="8" refX="0" refY="4" orient="auto">
      <polygon points="6 0, 12 4, 6 8, 0 4" fill="#64748b"/>
    </marker>
    <linearGradient id="headerGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#a16207"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="850" height="500" rx="12" fill="#f8fafc"/>

  <!-- Title -->
  <rect x="0" y="0" width="850" height="50" rx="12" fill="url(#headerGrad)"/>
  <rect x="0" y="12" width="850" height="38" fill="url(#headerGrad)"/>
  <text x="425" y="32" text-anchor="middle" fill="white" font-size="16" font-weight="bold">Data Model (Entity Relationship)</text>

  <!-- Student Entity -->
  <rect x="30" y="80" width="220" height="170" rx="8" fill="white" stroke="#3b82f6" stroke-width="2" filter="url(#shadow)"/>
  <rect x="30" y="80" width="220" height="35" rx="8" fill="#3b82f6"/>
  <rect x="30" y="100" width="220" height="15" fill="#3b82f6"/>
  <text x="140" y="103" text-anchor="middle" fill="white" font-size="12" font-weight="bold">Student</text>
  <text x="50" y="135" fill="#374151" font-size="10">id: string (PK)</text>
  <text x="50" y="155" fill="#374151" font-size="10">name: string</text>
  <text x="50" y="175" fill="#374151" font-size="10">email: string (unique)</text>
  <text x="50" y="195" fill="#374151" font-size="10">password_hash: string</text>
  <text x="50" y="215" fill="#374151" font-size="10">role: enum (student|admin)</text>
  <text x="50" y="235" fill="#374151" font-size="10">joined_at: timestamp</text>

  <!-- Challenge Entity -->
  <rect x="315" y="80" width="220" height="200" rx="8" fill="white" stroke="#16a34a" stroke-width="2" filter="url(#shadow)"/>
  <rect x="315" y="80" width="220" height="35" rx="8" fill="#16a34a"/>
  <rect x="315" y="100" width="220" height="15" fill="#16a34a"/>
  <text x="425" y="103" text-anchor="middle" fill="white" font-size="12" font-weight="bold">Challenge</text>
  <text x="335" y="135" fill="#374151" font-size="10">id: string (PK)</text>
  <text x="335" y="155" fill="#374151" font-size="10">title: string</text>
  <text x="335" y="175" fill="#374151" font-size="10">description: text</text>
  <text x="335" y="195" fill="#374151" font-size="10">tech_stack: string[]</text>
  <text x="335" y="215" fill="#374151" font-size="10">difficulty: enum</text>
  <text x="335" y="235" fill="#374151" font-size="10">realworld_app: string</text>
  <text x="335" y="255" fill="#374151" font-size="10">repo_url: string</text>
  <text x="335" y="270" fill="#94a3b8" font-size="9">enrolled_count, completed_count</text>

  <!-- ChallengeStep Entity -->
  <rect x="600" y="80" width="220" height="160" rx="8" fill="white" stroke="#7c3aed" stroke-width="2" filter="url(#shadow)"/>
  <rect x="600" y="80" width="220" height="35" rx="8" fill="#7c3aed"/>
  <rect x="600" y="100" width="220" height="15" fill="#7c3aed"/>
  <text x="710" y="103" text-anchor="middle" fill="white" font-size="12" font-weight="bold">ChallengeStep</text>
  <text x="620" y="135" fill="#374151" font-size="10">id: int (PK)</text>
  <text x="620" y="155" fill="#374151" font-size="10">challenge_id: string (FK)</text>
  <text x="620" y="175" fill="#374151" font-size="10">name: string</text>
  <text x="620" y="195" fill="#374151" font-size="10">description: text</text>
  <text x="620" y="215" fill="#374151" font-size="10">order: int</text>
  <text x="620" y="230" fill="#94a3b8" font-size="9">5 fixed steps per challenge</text>

  <!-- ChallengeProgress (junction) -->
  <rect x="100" y="310" width="260" height="170" rx="8" fill="white" stroke="#f97316" stroke-width="2" filter="url(#shadow)"/>
  <rect x="100" y="310" width="260" height="35" rx="8" fill="#f97316"/>
  <rect x="100" y="330" width="260" height="15" fill="#f97316"/>
  <text x="230" y="333" text-anchor="middle" fill="white" font-size="12" font-weight="bold">StudentChallengeProgress</text>
  <text x="120" y="365" fill="#374151" font-size="10">student_id: string (FK)</text>
  <text x="120" y="385" fill="#374151" font-size="10">challenge_id: string (FK)</text>
  <text x="120" y="405" fill="#374151" font-size="10">current_step: int</text>
  <text x="120" y="425" fill="#374151" font-size="10">status: enum (not_started|in_progress|completed)</text>
  <text x="120" y="445" fill="#374151" font-size="10">score: int | null</text>
  <text x="120" y="465" fill="#374151" font-size="10">cicd_result: enum | null</text>

  <!-- EvaluationResult -->
  <rect x="430" y="330" width="260" height="150" rx="8" fill="white" stroke="#dc2626" stroke-width="2" filter="url(#shadow)"/>
  <rect x="430" y="330" width="260" height="35" rx="8" fill="#dc2626"/>
  <rect x="430" y="350" width="260" height="15" fill="#dc2626"/>
  <text x="560" y="353" text-anchor="middle" fill="white" font-size="12" font-weight="bold">EvaluationResult</text>
  <text x="450" y="385" fill="#374151" font-size="10">id: string (PK)</text>
  <text x="450" y="405" fill="#374151" font-size="10">student_id: string (FK)</text>
  <text x="450" y="425" fill="#374151" font-size="10">challenge_id: string (FK)</text>
  <text x="450" y="445" fill="#374151" font-size="10">cicd_status: enum</text>
  <text x="450" y="465" fill="#374151" font-size="10">claude_score: int / feedback: text</text>

  <!-- Relationships -->
  <!-- Student -> Progress (1:N) -->
  <line x1="140" y1="250" x2="180" y2="310" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="125" y="280" fill="#64748b" font-size="9" font-weight="bold">1:N</text>

  <!-- Challenge -> Progress (1:N) -->
  <line x1="425" y1="280" x2="330" y2="310" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="390" y="300" fill="#64748b" font-size="9" font-weight="bold">1:N</text>

  <!-- Challenge -> Steps (1:N) -->
  <line x1="535" y1="150" x2="600" y2="150" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="565" y="143" fill="#64748b" font-size="9" font-weight="bold">1:5</text>

  <!-- Progress -> Evaluation -->
  <line x1="360" y1="400" x2="430" y2="400" stroke="#64748b" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <text x="395" y="393" fill="#64748b" font-size="9">eval</text>
</svg>
